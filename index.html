<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>蓋印紀念冊</title>

<!-- ============================================================
  字體說明:
  目前使用 Google Fonts 的「思源宋體」「霞鶴文楷」作為替代字體,
  方便你立即預覽效果。正式部署時,請依照你其他專案的做法,
  把下方 @font-face 換成你自己的字體檔案路徑,例如:
    @font-face { font-family: 'rixingsong'; src: url('./fonts/rixingsong-1.0-semibold.otf'); }
    @font-face { font-family: 'creamfont'; src: url('./fonts/creamfont-3.3.otf'); }
  並把 CSS 變數 --font-display / --font-body 改成對應的 font-family 名稱即可。
============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=LXGW+WenKai+TC:wght@400;500&display=swap" rel="stylesheet">

<!-- Leaflet for OpenStreetMap -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg: #F2EFE9;
    --ink: #3D3833;
    --ink-soft: #6B645C;
    --steel: #8A99A8;
    --steel-soft: #AEBAC4;
    --vermil: #B7705A;
    --vermil-soft: #D8B3A4;
    --khaki: #D9D2C3;
    --paper: #FAF8F4;

    --font-display: 'Noto Serif TC', serif;
    --font-body: 'LXGW WenKai TC', serif;

    --radius: 4px;
    --shadow-card: 0 1px 2px rgba(61,56,51,0.06), 0 4px 14px rgba(61,56,51,0.05);
  }

  /* 深色模式:延續同樣的 Morandi 氣質,只是底色換成深墨調,
     並微調煙燻藍灰/赭石紅的亮度,讓它們在深底上仍維持清晰可讀。 */
  [data-theme="dark"] {
    --bg: #2A2724;
    --ink: #EBE6DD;
    --ink-soft: #A39C92;
    --steel: #9FACB8;
    --steel-soft: #6B7682;
    --vermil: #CC8669;
    --vermil-soft: #5A4038;
    --khaki: #45403A;
    --paper: #34302B;

    --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.25);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  #root { min-height: 100vh; }

  .app-shell { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }

  .app-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 24px; padding-bottom: 18px;
    border-bottom: 1px solid var(--khaki);
  }

  .app-title {
    font-family: var(--font-display); font-weight: 700; font-size: 26px;
    letter-spacing: 0.06em; color: var(--ink); display: flex; align-items: center; gap: 10px;
  }

  .app-title .seal-mark {
    width: 30px; height: 30px; border: 2px solid var(--vermil); border-radius: 3px;
    display: flex; align-items: center; justify-content: center; color: var(--vermil);
    font-size: 15px; font-weight: 700; transform: rotate(-3deg); flex-shrink: 0;
  }

  .app-subtitle { font-size: 12.5px; color: var(--ink-soft); letter-spacing: 0.04em; margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; }
  .theme-toggle-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--khaki);
    background: var(--paper); color: var(--ink-soft); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s ease;
  }
  .theme-toggle-btn:hover { border-color: var(--steel); color: var(--ink); }

  .nav-tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .nav-tab {
    font-family: var(--font-display); font-size: 14px; letter-spacing: 0.03em;
    padding: 8px 18px; background: transparent; border: 1px solid var(--khaki);
    border-radius: var(--radius); color: var(--ink-soft); cursor: pointer; transition: all 0.15s ease;
  }
  .nav-tab:hover { border-color: var(--steel); color: var(--ink); }
  .nav-tab.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  .sub-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .sub-tab {
    font-size: 12.5px; padding: 6px 14px; border-radius: 14px; border: 1px solid var(--khaki);
    background: transparent; color: var(--ink-soft); cursor: pointer; transition: all 0.15s ease;
  }
  .sub-tab:hover { border-color: var(--steel); color: var(--ink); }
  .sub-tab.active { background: var(--steel); border-color: var(--steel); color: #fff; }

  .calendar-box {
    background: var(--paper); border: 1px solid var(--khaki); border-radius: 6px; padding: 18px 14px;
  }
  .calendar-nav { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 16px; }
  .calendar-nav-btn {
    background: none; border: none; cursor: pointer; color: var(--ink-soft); font-size: 18px; padding: 4px 10px;
  }
  .calendar-nav-btn:hover { color: var(--vermil); }
  .calendar-month-label { font-family: var(--font-display); font-weight: 600; font-size: 16px; min-width: 110px; text-align: center; }

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .calendar-weekday { text-align: center; font-size: 11.5px; color: var(--ink-soft); padding-bottom: 8px; }
  .calendar-day-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius); cursor: pointer; font-size: 14px; color: var(--ink);
    transition: background 0.12s ease;
  }
  .calendar-day-cell:hover { background: var(--bg); }
  .calendar-day-cell.empty { cursor: default; }
  .calendar-day-cell.empty:hover { background: none; }
  .calendar-day-cell.has-stamp { color: var(--vermil); font-weight: 700; }
  .calendar-day-cell.is-today { background: var(--vermil); color: #fff; font-weight: 700; }
  .calendar-day-cell.is-today:hover { background: var(--vermil); }
  .calendar-day-cell.is-selected:not(.is-today) { border: 1.5px solid var(--vermil); }

  .calendar-day-detail { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--khaki); }
  .calendar-day-detail-title { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--vermil); margin-bottom: 10px; }
  .calendar-day-detail-empty { font-size: 12.5px; color: var(--ink-soft); }

  .btn {
    font-family: var(--font-body); font-size: 13.5px; padding: 9px 18px;
    border-radius: var(--radius); border: 1px solid var(--khaki); background: var(--paper);
    color: var(--ink); cursor: pointer; transition: all 0.15s ease;
  }
  .btn:hover { border-color: var(--steel); }
  .btn-primary { background: var(--vermil); border-color: var(--vermil); color: #fff; }
  .btn-primary:hover { background: #A35F4B; border-color: #A35F4B; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-soft); }
  .btn-ghost:hover { color: var(--vermil); }
  .btn-sm { padding: 5px 12px; font-size: 12.5px; }
  .btn:disabled { opacity: 0.5; cursor: default; }

  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px;
    padding: 6px 12px; border-radius: 14px; background: var(--steel); color: #fff; white-space: nowrap;
  }
  .filter-chip button { background: none; border: none; color: rgba(255,255,255,0.85); cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
  .filter-chip button:hover { color: #fff; }
  .filter-add-btn {
    font-size: 12.5px; padding: 6px 14px; border-radius: 14px; border: 1px dashed var(--khaki);
    background: transparent; color: var(--ink-soft); cursor: pointer;
  }
  .filter-add-btn:hover { border-color: var(--steel); color: var(--ink); }
  .filter-clear-btn { font-size: 12px; color: var(--vermil); background: none; border: none; cursor: pointer; padding: 4px 6px; }

  .tree-picker-wrap { position: relative; }
  .tree-picker-panel {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 60; width: 280px; max-height: 360px;
    overflow-y: auto; background: var(--paper); border: 1px solid var(--khaki); border-radius: var(--radius);
    box-shadow: 0 8px 28px rgba(61,56,51,0.16); padding: 10px;
  }
  .tree-node-row { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
  .tree-node-row:hover { background: var(--bg); }
  .tree-node-row.checked { color: var(--vermil); font-weight: 600; }
  .tree-node-row input { accent-color: var(--vermil); cursor: pointer; }
  .tree-node-label { flex: 1; }
  .tree-node-empty { font-size: 12px; color: var(--ink-soft); padding: 10px 6px; }

  .stamp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .stamp-card {
    background: var(--paper); border: 1px solid var(--khaki); border-radius: var(--radius);
    box-shadow: var(--shadow-card); overflow: hidden; cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease; display: flex; flex-direction: column;
  }
  .stamp-card:hover { transform: translateY(-2px); box-shadow: 0 4px 18px rgba(61,56,51,0.1); }
  .stamp-photo { width: 100%; height: 140px; object-fit: cover; background: var(--khaki); display: block; }
  .stamp-photo-placeholder {
    width: 100%; height: 140px; background: linear-gradient(135deg, var(--khaki), var(--steel-soft));
    display: flex; align-items: center; justify-content: center; color: var(--paper);
    font-family: var(--font-display); font-size: 28px; font-weight: 700;
  }
  .stamp-card-body { padding: 12px 14px 14px; position: relative; }
  .stamp-seal-icon {
    position: absolute; top: -16px; right: 12px; width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--vermil); background: var(--paper); color: var(--vermil);
    font-family: var(--font-display); font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(61,56,51,0.12);
  }
  .stamp-location { font-family: var(--font-display); font-weight: 600; font-size: 15px; margin: 0 0 4px; padding-right: 28px; }
  .stamp-venue { font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
  .stamp-date { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 6px; }
  .stamp-note-preview {
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px;
  }
  .stamp-tag-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .stamp-tag-mini { font-size: 10.5px; padding: 1px 8px; border-radius: 8px; background: var(--bg); color: var(--ink-soft); border: 1px solid var(--khaki); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-soft); border: 1px dashed var(--khaki); border-radius: var(--radius); }
  .empty-state-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }
  .empty-state-text { font-size: 13.5px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(61,56,51,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
  .modal-box { background: var(--bg); border-radius: 6px; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; padding: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  .modal-title { font-family: var(--font-display); font-weight: 700; font-size: 19px; margin: 0 0 20px; }
  .field-group { margin-bottom: 16px; }
  .field-label { display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 5px; letter-spacing: 0.02em; }
  .field-input, .field-textarea, .field-select {
    width: 100%; font-family: var(--font-body); font-size: 14px; padding: 9px 12px;
    border: 1px solid var(--khaki); border-radius: var(--radius); background: var(--paper); color: var(--ink);
  }
  .field-input:focus, .field-textarea:focus, .field-select:focus { outline: none; border-color: var(--steel); }
  .field-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  .geocode-status { font-size: 11.5px; margin-top: 5px; color: var(--ink-soft); }
  .geocode-status.ok { color: #6F8A6B; }
  .geocode-status.err { color: var(--vermil); }

  .photo-upload-zone { border: 1px dashed var(--khaki); border-radius: var(--radius); padding: 14px; text-align: center; cursor: pointer; font-size: 12.5px; color: var(--ink-soft); background: var(--paper); }
  .photo-upload-zone:hover { border-color: var(--steel); }
  .photo-preview-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .photo-preview-thumb { position: relative; width: 64px; height: 64px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--khaki); }
  .photo-preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-preview-remove { position: absolute; top: 2px; right: 2px; background: rgba(61,56,51,0.7); color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 1; cursor: pointer; }

  .selected-tags-box { display: flex; gap: 6px; flex-wrap: wrap; min-height: 32px; border: 1px solid var(--khaki); border-radius: var(--radius); padding: 6px 8px; background: var(--paper); }
  .selected-tag-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 3px 9px; border-radius: 12px; background: var(--vermil-soft); color: var(--ink); }
  .selected-tag-pill button { background: none; border: none; cursor: pointer; color: var(--ink); font-size: 12px; padding: 0; }
  .selected-tags-empty { font-size: 12px; color: var(--ink-soft); padding: 4px; }

  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--khaki); }

  .detail-photo-strip { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; }
  .detail-photo-strip img { height: 200px; width: auto; border-radius: var(--radius); flex-shrink: 0; }
  .detail-meta-line { font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; }
  .detail-note { font-size: 14px; line-height: 1.8; margin-top: 14px; white-space: pre-wrap; }
  .detail-tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

  .category-tree-list { margin-bottom: 14px; }
  .category-node-row { display: flex; align-items: center; gap: 0; border-radius: var(--radius); }
  .category-node-row:hover { background: var(--paper); }

  /* 樹狀連接線:每一層佔 22px 寬,放兩個獨立的線段——
     貫穿整行高度的垂直線(該層祖先若還有後續兄弟節點時顯示),
     和只到節點文字中心高度的轉角線(僅自己這一層顯示)。 */
  .tree-lines { display: flex; flex-shrink: 0; align-self: stretch; }
  .tree-line-col { width: 22px; position: relative; flex-shrink: 0; }
  .tree-vline { position: absolute; left: 10px; top: 0; bottom: 0; width: 1px; background: var(--khaki); }
  .tree-vline.half-up { bottom: 50%; }
  .tree-hline { position: absolute; left: 10px; top: 50%; width: 12px; height: 1px; background: var(--khaki); }
  .category-node-content { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex: 1; padding: 7px 8px 7px 0; min-width: 0; }
  .category-node-left { display: flex; align-items: center; gap: 8px; font-size: 13.5px; }
  .category-node-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .category-node-row:hover .category-node-actions { opacity: 1; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-soft); font-size: 13px; padding: 3px 6px; border-radius: 3px; }
  .icon-btn:hover { color: var(--vermil); background: var(--bg); }

  .add-category-row { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--khaki); }
  .add-category-row .field-input { flex: 1; }

  .map-container { height: 560px; border-radius: var(--radius); border: 1px solid var(--khaki); overflow: hidden; position: relative; z-index: 1; }
  .leaflet-popup-content-wrapper { border-radius: var(--radius); font-family: var(--font-body); }
  /* Leaflet 預設會把控制元件/動畫面板的 z-index 設到 400~1000,
     這裡明確收斂在 .map-container 範圍內,避免蓋住其上層的 modal。 */
  .map-container .leaflet-pane,
  .map-container .leaflet-top,
  .map-container .leaflet-bottom,
  .map-container .leaflet-control { z-index: 5 !important; }
  .map-popup-title { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; margin-bottom: 2px; }
  .map-popup-date { font-size: 11px; color: var(--ink-soft); }
  .map-popup-clickable { cursor: pointer; }
  .map-popup-clickable:hover .map-popup-title { color: var(--vermil); }

  .map-cluster-badge {
    width: 30px; height: 30px; border-radius: 50%; background: var(--vermil);
    color: #fff; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; font-size: 13px;
  }
  .map-popup-list-title { font-family: var(--font-display); font-weight: 600; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 6px; }
  .map-popup-list-item {
    padding: 6px 4px; border-top: 1px solid var(--khaki); cursor: pointer; font-size: 13px;
  }
  .map-popup-list-item:first-of-type { border-top: none; }
  .map-popup-list-item:hover { color: var(--vermil); }
  .map-popup-list-item .map-popup-date { display: block; }

  .fab {
    position: fixed; bottom: 28px; right: 28px; width: 54px; height: 54px; border-radius: 50%;
    background: var(--vermil); color: #fff; border: none; font-size: 26px;
    box-shadow: 0 4px 16px rgba(183,112,90,0.4); cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 50;
  }
  .fab:hover { background: #A35F4B; }

  .loading-text { text-align: center; padding: 40px; color: var(--ink-soft); font-size: 13px; }

  /* ===== Wishlist (待蓋清單) ===== */
  .wishlist-list { display: flex; flex-direction: column; gap: 12px; }
  .wishlist-card {
    background: var(--paper); border: 1px solid var(--khaki); border-radius: var(--radius);
    box-shadow: var(--shadow-card); padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start;
  }
  .wishlist-card.due-soon { border-color: var(--vermil-soft); }
  .wishlist-icon {
    width: 44px; height: 44px; border-radius: var(--radius); flex-shrink: 0;
    background: linear-gradient(135deg, var(--khaki), var(--steel-soft));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--paper);
  }
  .wishlist-body { flex: 1; min-width: 0; }
  .wishlist-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .wishlist-name {
    font-family: var(--font-display); font-weight: 600; font-size: 15px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .wishlist-venue { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
  .wishlist-meta-line { font-size: 11.5px; color: var(--ink-soft); margin-top: 3px; }
  .wishlist-deadline { font-size: 11.5px; color: var(--ink-soft); flex-shrink: 0; white-space: nowrap; text-align: right; margin-top: 1px; }
  .wishlist-deadline.due-soon { color: var(--vermil); font-weight: 600; }
  .wishlist-note { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; margin-top: 6px; }
  .wishlist-source-link {
    display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--steel);
    margin-top: 6px; text-decoration: none; word-break: break-all;
  }
  .wishlist-source-link:hover { color: var(--vermil); text-decoration: underline; }
  .wishlist-actions { display: flex; gap: 8px; margin-top: 8px; }
  .wishlist-tag-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }

  @media (max-width: 600px) {
    .app-shell { padding: 20px 14px 80px; }
    .stamp-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .map-container { height: 420px; }
    .tree-picker-panel { width: 240px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<s
