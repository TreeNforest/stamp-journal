<script type="importmap">

    "firebase/firestore": "https://esm.sh/firebase@10.12.2/firestore"

<script type="module">

try {

    authDomain: "stamp-journal-7b9cb.firebaseapp.com",
    projectId: "stamp-journal-7b9cb",
    storageBucket: "stamp-journal-7b9cb.firebasestorage.app",

    appId: "1:207752007024:web:9bbd64031f90830cbcd3b5"

  const app = initializeApp(firebaseConfig);
  rootEl.innerHTML += '步驟3: initializeApp 成功<br>';

  const { getFirestore } = await import('firebase/firestore');
  rootEl.innerHTML += '步驟4: Firestore 模組載入成功<br>';
